            ''timestamp'') -0) %}{{ end_time.hour + end_time.minute * 256 }}'
  - delay:
      hours: 0
      minutes: 0
      seconds: 5
      milliseconds: 0
  - action: input_boolean.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: input_boolean.solax_automation_running
  mode: single
