- id: '5003'
  alias: Solax Set UI Options
  description: Set Solax Options from UI
  triggers:
  - entity_id:
    - input_number.solax_feed_in_battery_min_soc
    id: Set Feed in Min SoC
    trigger: state
  - entity_id:
