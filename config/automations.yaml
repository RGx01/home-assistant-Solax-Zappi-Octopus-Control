find and replace, zappi_XXXXXXXX with zappi number, z_ZZZZZZZZ with Octopus account

- id: '5001'
  alias: Solax Zappi Octopus Control
  description: Solax Zappi Octopus Control - V1.03
  triggers:
  - entity_id:
    - sensor.zappi_plug_status
    from:
    to: Fault
    id: Zappi Fault
    trigger: state
  - entity_id:
    - sensor.zappi_plug_status
    from: Charging
    to: EV Disconnected
    id: Charging to Disconnected
    trigger: state
  - entity_id:
    - sensor.zappi_plug_status
    from: EV Connected
    to: EV Disconnected
    id: Connected to Disconnected
    trigger: state
  - entity_id:
    - sensor.zappi_plug_status
    from: Charging
    to: EV Connected
    id: Finished Charging
    trigger: state
  - entity_id:
    - sensor.zappi_plug_status
    from: Waiting for EV
    to: EV Connected
    id: Finished Charging
    trigger: state
  - entity_id:
    - sensor.zappi_plug_status
    from: EV Disconnected
    to: EV Connected
    id: Disconnected To Connected
    trigger: state
  - entity_id:
    - sensor.zappi_plug_status
    from: Fault
    to: Charging
    id: Charging0
    trigger: state
  - entity_id:
    - sensor.zappi_plug_status
    from: Waiting for EV
    to: Charging
    id: Charging1
    trigger: state
  - entity_id:
    - sensor.zappi_plug_status
    to: Charging
    id: Charging2
    from: EV Connected
    trigger: state
  - at: sensor.ev_start_time
    id: Time to Start Charging
    trigger: time
  - at: '23:30:00'
    id: Discharge_battery_at_2330
    enabled: true
    trigger: time
  - entity_id:
    - binary_sensor.octopus_energy_z_ZZZZZZZZ_intelligent_dispatching
    to: 'off'
    id: Peak Rate
    trigger: state
  - entity_id:
    - select.myenergi_zappi_XXXXXXXX_charge_mode
    for:
      hours: 0
      minutes: '{{(state_attr(''input_datetime.solax_stop_charge_2'', ''timestamp'')/60-state_attr(''input_datetime.solax_start_charge_2'',
        ''timestamp'')/60)|int (default = 60)}}'
      seconds: 0
    to: Fast
    id: Fast
    trigger: state
  - entity_id:
    - input_button.solax_force_discharge
    id: ForceDischarge
    trigger: state
  - entity_id:
    - input_button.solax_stop_discharge
    id: StopForceDischarge
    trigger: state
  - trigger: state
    entity_id:
    - input_boolean.zappi_eco_mode_override
    to: 'on'
    id: Allow Octopus to Determine Schedule
  - trigger: state
    entity_id:
    - input_boolean.solar_export_priority
    to: 'on'
    id: Only allow EV charging after sunset
  - trigger: state
    entity_id:
    - input_boolean.ev_solax_battery_drain
    - input_boolean.use_grid_during_octopus_dispatch
    id: Battery usage options
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - Allow Octopus to Determine Schedule
      sequence:
      - action: input_boolean.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: input_boolean.solar_export_priority
    - conditions:
      - condition: trigger
        id:
        - Only allow EV charging after sunset
      sequence:
      - action: input_boolean.turn_off
        metadata: {}
        data: {}
        target:
          entity_id:
          - input_boolean.zappi_eco_mode_override
    enabled: true
  - condition: not
    conditions:
    - condition: or
      conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - Discharge_battery_at_2330
        - condition: or
          conditions:
          - condition: state
            entity_id: sensor.zappi_plug_status
            state: Charging
          - condition: state
            entity_id: sensor.zappi_plug_status
            state: Waiting for EV
          - condition: state
            entity_id: sensor.solax_local_manual_mode_behaviour
            state: Force Discharge
      - condition: and
        conditions:
        - condition: trigger
          id:
          - Time to Start Charging
        - condition: state
          entity_id: sensor.zappi_plug_status
          state: EV Disconnected
      - condition: trigger
        id:
        - Only allow EV charging after sunset
      - condition: and
        conditions:
        - condition: trigger
          id:
          - Allow Octopus to Determine Schedule
        - condition: state
          entity_id: sensor.zappi_plug_status
          state: Charging
      - condition: and
        conditions:
        - condition: trigger
          id:
          - Battery usage options
        - condition: state
          entity_id: sensor.zappi_plug_status
          state: Charging
  - condition: template
    value_template: '{{now()|as_timestamp-states(''sensor.uptime'')|as_timestamp>80}}

      '
  - variables:
      default_mode: '{{states(''sensor.solax_default_operation_mode'')|int}}'
      default_min_soc: '{% if (states(''input_boolean.use_grid_during_octopus_dispatch'')
        == ''on'' and now() > today_at(''23:29''))%} {{100}}  {% else %} {{states(''input_number.solax_default_discharge_limit_soc'')|int}}  {%endif
        %}

        '
      while_charging_soc: '{% if states(''input_boolean.ev_solax_battery_drain'')
        == ''off'' and states(''input_boolean.use_grid_during_octopus_dispatch'')
        == ''on'' %}  {{100}} {% elif states(''input_boolean.ev_solax_battery_drain'')
        == ''off'' and states(''input_boolean.use_grid_during_octopus_dispatch'')
        == ''off'' %}  {{states(''input_number.solax_default_discharge_limit_soc'')|int}}  {%
        elif states(''input_boolean.ev_solax_battery_drain'') == ''on''  %}  {{100}}
        {%endif %}

        '
      while_dispatch_soc: '{% if states(''input_boolean.use_grid_during_octopus_dispatch'')
        == ''on''%} {{100}} {% else %} {{states(''input_number.solax_default_discharge_limit_soc'')|int}}
        {%endif %}

        '
      mode_delay: 15
      settings_delay: 5
      refresh_settings_delay: 5
  - action: input_number.set_value
    target:
      entity_id: input_number.solax_manual_forced_discharge_limit_soc
    data:
      value: 20
  - action: input_boolean.turn_on
    metadata: {}
    data: {}
    target:
      entity_id: input_boolean.solax_automation_running
  - action: homeassistant.update_entity
    data:
      entity_id:
      - sensor.solax_rest_local_settings
  - delay:
      hours: 0
      minutes: 0
      seconds: '{{refresh_settings_delay}}'
      milliseconds: 0
  - if:
    - condition: or
      conditions:
      - condition: trigger
        id:
        - Finished Charging
      - condition: state
        entity_id: sensor.zappi_plug_status
        state: Charging
    then:
    - choose:
      - conditions:
        - condition: template
          value_template: '{{states(''sensor.zappi_plug_status'')==''Charging''}}'
        sequence:
        - condition: not
          conditions:
          - condition: template
            value_template: '{{(state_attr(''sensor.solax_local_settings'', ''Data'')[0]
              == while_charging_soc and state_attr(''sensor.solax_local_settings'',
              ''Data'')[12] == while_charging_soc)}}'
        - repeat:
            sequence:
            - action: rest_command.solax_local_set_selfuse_battery_min_soc
              data:
                level: '{{while_charging_soc}}'
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{settings_delay}}'
                milliseconds: 0
            - action: rest_command.solax_local_set_feedin_battery_min_soc
              data:
                level: '{{while_charging_soc}}'
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{settings_delay}}'
                milliseconds: 0
            - action: homeassistant.update_entity
              data:
                entity_id:
                - sensor.solax_rest_local_settings
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{refresh_settings_delay}}'
                milliseconds: 0
            until:
            - condition: template
              value_template: '{{ (state_attr(''sensor.solax_local_settings'', ''Data'')[0]
                == while_charging_soc and state_attr(''sensor.solax_local_settings'',
                ''Data'')[12] == while_charging_soc) or repeat.index == 3 }}'
      - conditions:
        - condition: template
          value_template: '{{states(''binary_sensor.octopus_energy_z_ZZZZZZZZ_intelligent_dispatching'')==''off''}}'
        sequence:
        - condition: not
          conditions:
          - condition: template
            value_template: '{{(state_attr(''sensor.solax_local_settings'', ''Data'')[0]
              == default_min_soc and state_attr(''sensor.solax_local_settings'', ''Data'')[12]
              == default_min_soc)}}'
        - repeat:
            sequence:
            - action: rest_command.solax_local_set_selfuse_battery_min_soc
              data:
                level: '{{default_min_soc}}'
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{settings_delay}}'
                milliseconds: 0
            - action: rest_command.solax_local_set_feedin_battery_min_soc
              data:
                level: '{{default_min_soc}}'
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{settings_delay}}'
                milliseconds: 0
            - action: homeassistant.update_entity
              data:
                entity_id:
                - sensor.solax_rest_local_settings
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{refresh_settings_delay}}'
                milliseconds: 0
            until:
            - condition: template
              value_template: '{{ (state_attr(''sensor.solax_local_settings'', ''Data'')[0]
                == default_min_soc and state_attr(''sensor.solax_local_settings'',
                ''Data'')[12] == default_min_soc) or repeat.index == 3 }}'
      - conditions:
        - condition: template
          value_template: '{{states(''binary_sensor.octopus_energy_z_ZZZZZZZZ_intelligent_dispatching'')==''on''}}'
        sequence:
        - condition: not
          conditions:
          - condition: template
            value_template: '{{(state_attr(''sensor.solax_local_settings'', ''Data'')[0]
              == while_dispatch_soc and state_attr(''sensor.solax_local_settings'',
              ''Data'')[12] == while_dispatch_soc)}}'
        - repeat:
            sequence:
            - action: rest_command.solax_local_set_selfuse_battery_min_soc
              data:
                level: '{{while_dispatch_soc}}'
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{settings_delay}}'
                milliseconds: 0
            - action: rest_command.solax_local_set_feedin_battery_min_soc
              data:
                level: '{{while_dispatch_soc}}'
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{settings_delay}}'
                milliseconds: 0
            - action: homeassistant.update_entity
              data:
                entity_id:
                - sensor.solax_rest_local_settings
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{refresh_settings_delay}}'
                milliseconds: 0
            until:
            - condition: template
              value_template: '{{ (state_attr(''sensor.solax_local_settings'', ''Data'')[0]
                == while_dispatch_soc and state_attr(''sensor.solax_local_settings'',
                ''Data'')[12] == while_dispatch_soc) or repeat.index == 3 }}'
    else:
    - choose:
      - conditions:
        - condition: template
          value_template: '{{states(''binary_sensor.octopus_energy_z_ZZZZZZZZ_intelligent_dispatching'')==''off''}}'
        sequence:
        - condition: not
          conditions:
          - condition: template
            value_template: "{{(state_attr('sensor.solax_local_settings', 'Data')[0]
              == default_min_soc\n  and state_attr('sensor.solax_local_settings',
              'Data')[12] == default_min_soc)}}"
        - repeat:
            sequence:
            - action: rest_command.solax_local_set_selfuse_battery_min_soc
              data:
                level: '{{default_min_soc}}'
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{settings_delay}}'
                milliseconds: 0
            - action: rest_command.solax_local_set_feedin_battery_min_soc
              data:
                level: '{{default_min_soc}}'
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{settings_delay}}'
                milliseconds: 0
            - action: homeassistant.update_entity
              data:
                entity_id:
                - sensor.solax_rest_local_settings
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{refresh_settings_delay}}'
                milliseconds: 0
            until:
            - condition: template
              value_template: '{{ (state_attr(''sensor.solax_local_settings'', ''Data'')[0]
                == default_min_soc and state_attr(''sensor.solax_local_settings'',
                ''Data'')[12] == default_min_soc) or repeat.index == 3 }}'
      - conditions:
        - condition: or
          conditions:
          - condition: template
            value_template: '{{states(''binary_sensor.octopus_energy_z_ZZZZZZZZ_intelligent_dispatching'')==''on''}}'
          - condition: and
            conditions:
            - condition: time
              after: '23:30:00'
              before: 05:30:00
            - condition: state
              entity_id: input_boolean.use_grid_during_octopus_dispatch
              state: 'on'
        sequence:
        - condition: not
          conditions:
          - condition: template
            value_template: "{{(state_attr('sensor.solax_local_settings', 'Data')[0]
              == while_dispatch_soc\n  and state_attr('sensor.solax_local_settings',
              'Data')[12] ==\n  while_dispatch_soc)}}"
        - repeat:
            sequence:
            - action: rest_command.solax_local_set_selfuse_battery_min_soc
              data:
                level: '{{while_dispatch_soc}}'
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{settings_delay}}'
                milliseconds: 0
            - action: rest_command.solax_local_set_feedin_battery_min_soc
              data:
                level: '{{while_dispatch_soc}}'
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{settings_delay}}'
                milliseconds: 0
            - action: homeassistant.update_entity
              data:
                entity_id:
                - sensor.solax_rest_local_settings
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{refresh_settings_delay}}'
                milliseconds: 0
            until:
            - condition: template
              value_template: '{{ (state_attr(''sensor.solax_local_settings'', ''Data'')[0]
                == while_dispatch_soc and state_attr(''sensor.solax_local_settings'',
                ''Data'')[12] == while_dispatch_soc) or repeat.index == 3 }}'
  - choose:
    - conditions:
      - condition: state
        entity_id: sensor.zappi_plug_status
        state: Charging
      - condition: state
        entity_id: select.myenergi_zappi_XXXXXXXX_charge_mode
        state: Eco+
      sequence:
      - repeat:
          sequence:
          - data:
              value: '{{default_mode}}'
            action: rest_command.solax_local_set_inverter_mode
          - delay:
              hours: 0
              minutes: 0
              seconds: '{{mode_delay}}'
              milliseconds: 0
          - action: homeassistant.update_entity
            data:
              entity_id:
              - sensor.solax_rest_local_settings
          - delay:
              hours: 0
              minutes: 0
              seconds: '{{refresh_settings_delay}}'
              milliseconds: 0
          until:
          - condition: template
            value_template: '{{ (state_attr(''sensor.solax_local_settings'', ''Data'')[10]
              == default_mode) or repeat.index == 3 }}'
      - event: Solax Zappi Octopus Control
        event_data:
          message: EV started charging @ {{now().strftime('%H:%M')}}. Planned total
            to dispatch       {{states('sensor.octopus_total_planned_dispatch')}}kWh
          title: OP1:EV Charging Started
          class: normal
        enabled: true
    - conditions:
      - condition: trigger
        id:
        - Finished Charging
      sequence:
      - if:
        - condition: time
          after: '23:30:00'
          before: input_datetime.solax_battery_start_charge_time
        - condition: state
          entity_id: input_boolean.export_battery
          state: 'on'
        - condition: numeric_state
          entity_id: sensor.solax_local_battery_soc
          value_template: '{{ state.state | float(0)  - 4 }}'
          above: input_number.solax_manual_forced_discharge_limit_soc
        - condition: template
          value_template: '{{(state_attr(''sensor.solax_local_settings'', ''Data'')[10]
            != 3)}}'
        then:
        - action: input_number.set_value
          target:
            entity_id: input_number.solax_manual_forced_discharge_limit_soc
          data:
            value: 20
        - repeat:
            sequence:
            - data:
                value: 3
              action: rest_command.solax_local_set_inverter_mode
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{mode_delay}}'
                milliseconds: 0
            - data:
                value: 2
              action: rest_command.solax_local_set_manual_mode_behaviour
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{mode_delay}}'
                milliseconds: 0
            - action: homeassistant.update_entity
              data:
                entity_id:
                - sensor.solax_rest_local_settings
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{refresh_settings_delay}}'
                milliseconds: 0
            until:
            - condition: template
              value_template: '{{ (state_attr(''sensor.solax_local_settings'', ''Data'')[10]
                == 3 and state_attr(''sensor.solax_local_settings'', ''Data'')[11]
                == 2) or repeat.index == 3 }}'
        - event: Solax Zappi Octopus Control
          event_data:
            message: EV stopped charging @ {{now().strftime('%H:%M')}}. Attempting
              Discharge. Completed dispatch {{states('sensor.octopus_completed_dispatch')}}kWh
            title: OP2:EV Stopped Charging - Attempting Battery Export.
            class: normal
          enabled: true
        else:
        - event: Solax Zappi Octopus Control
          event_data:
            message: EV stopped charging @ {{now().strftime('%H:%M')}}. Completed
              dispatch {{states('sensor.octopus_completed_dispatch')}}kWh
            title: OP2:EV Stopped Charging.
            class: normal
          enabled: true
    - conditions:
      - condition: trigger
        id:
        - Disconnected To Connected
        - Time to Start Charging
        - Allow Octopus to Determine Schedule
      - condition: state
        entity_id: sensor.zappi_plug_status
        state: EV Connected
      sequence:
      - if:
        - condition: or
          conditions:
          - condition: time
            after: sensor.ev_start_time
            before: sensor.octopus_intelligent_target_time
          - condition: state
            entity_id: input_boolean.zappi_eco_mode_override
            state: 'on'
        then:
        - metadata: {}
          data:
            option: Eco+
          target:
            entity_id: select.myenergi_zappi_XXXXXXXX_charge_mode
          action: select.select_option
        - metadata: {}
          data: {}
          target:
            entity_id: switch.octopus_energy_z_ZZZZZZZZ_intelligent_smart_charge
          enabled: true
          action: switch.turn_on
        - repeat:
            sequence:
            - data:
                value: '{{default_mode}}'
              action: rest_command.solax_local_set_inverter_mode
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{mode_delay}}'
                milliseconds: 0
            - action: homeassistant.update_entity
              data:
                entity_id:
                - sensor.solax_rest_local_settings
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{refresh_settings_delay}}'
                milliseconds: 0
            until:
            - condition: template
              value_template: '{{ (state_attr(''sensor.solax_local_settings'', ''Data'')[10]
                == default_mode) or repeat.index == 3 }}'
      - event: Solax Zappi Octopus Control
        event_data:
          message: EV Connected @ {{now().strftime('%H:%M')}}.Getting shedule at {{(states('sensor.ev_start_time')|as_datetime).strftime('%H:%M')}}.
          title: OP3:EV Connected - Waiting for Octopus schedule
          class: normal
        enabled: true
    - conditions:
      - condition: trigger
        id:
        - Disconnected To Connected
      sequence:
      - metadata: {}
        data:
          option: Stopped
        target:
          entity_id: select.myenergi_zappi_XXXXXXXX_charge_mode
        action: select.select_option
      - metadata: {}
        data: {}
        target:
          entity_id: switch.octopus_energy_z_ZZZZZZZZ_intelligent_smart_charge
        action: switch.turn_off
      - repeat:
          sequence:
          - data:
              value: '{{default_mode}}'
            action: rest_command.solax_local_set_inverter_mode
          - delay:
              hours: 0
              minutes: 0
              seconds: '{{mode_delay}}'
              milliseconds: 0
          - action: homeassistant.update_entity
            data:
              entity_id:
              - sensor.solax_rest_local_settings
          - delay:
              hours: 0
              minutes: 0
              seconds: '{{refresh_settings_delay}}'
              milliseconds: 0
          until:
          - condition: template
            value_template: '{{ (state_attr(''sensor.solax_local_settings'', ''Data'')[10]
              == default_mode) or repeat.index == 3 }}'
      - event: Solax Zappi Octopus Control
        event_data:
          message: EV Connected @ {{now().strftime('%H:%M')}}
          title: OP4:EV Connected
          class: normal
        enabled: true
    - conditions:
      - condition: trigger
        id:
        - Connected to Disconnected
        - Charging to Disconnected
      sequence:
      - metadata: {}
        data:
          option: Stopped
        target:
          entity_id: select.myenergi_zappi_XXXXXXXX_charge_mode
        action: select.select_option
      - metadata: {}
        data: {}
        target:
          entity_id: switch.octopus_energy_z_ZZZZZZZZ_intelligent_smart_charge
        action: switch.turn_off
      - repeat:
          sequence:
          - data:
              value: '{{default_mode}}'
            action: rest_command.solax_local_set_inverter_mode
          - delay:
              hours: 0
              minutes: 0
              seconds: '{{mode_delay}}'
              milliseconds: 0
          - action: homeassistant.update_entity
            data:
              entity_id:
              - sensor.solax_rest_local_settings
          - delay:
              hours: 0
              minutes: 0
              seconds: '{{refresh_settings_delay}}'
              milliseconds: 0
          until:
          - condition: template
            value_template: '{{ (state_attr(''sensor.solax_local_settings'', ''Data'')[10]
              == default_mode) or repeat.index == 3 }}'
      - event: Solax Zappi Octopus Control
        event_data:
          message: EV disconnected @ {{now().strftime('%H:%M')}}
          title: OP5:EV Disconnected
          class: normal
        enabled: true
    - conditions:
      - condition: trigger
        id:
        - Zappi Fault
      sequence:
      - event: Solax Zappi Octopus Control
        event_data:
          message: ZAPPI FAULT @ {{now().strftime('%H:%M')}}. Go outside and follow
            instructions on charger
          title: OP6:ZAPPI FAULT
          class: high
        enabled: true
    - conditions:
      - condition: trigger
        id:
        - Fast
      sequence:
      - metadata: {}
        data:
          option: Stopped
        target:
          entity_id: select.myenergi_zappi_XXXXXXXX_charge_mode
        action: select.select_option
      - event: Solax Zappi Octopus Control
        event_data:
          message: EV started charging @ {{now().strftime('%H:%M')}}. Planned total
            to dispatch       {{states('sensor.octopus_total_planned_dispatch')}}kWh
          title: OP7:EV FAST Charging Started
          class: normal
        enabled: true
    - conditions:
      - condition: trigger
        id:
        - ForceDischarge
      - condition: template
        value_template: '{{(state_attr(''sensor.solax_local_settings'', ''Data'')[10]
          != 3)}}'
      sequence:
      - if:
        - condition: numeric_state
          entity_id: sensor.solax_local_battery_soc
          above: input_number.solax_manual_forced_discharge_limit_soc
          value_template: '{{ state.state | float(0)  - 4 }}'
        then:
        - repeat:
            sequence:
            - data:
                value: 3
              action: rest_command.solax_local_set_inverter_mode
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{mode_delay}}'
                milliseconds: 0
            - data:
                value: 2
              action: rest_command.solax_local_set_manual_mode_behaviour
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{mode_delay}}'
                milliseconds: 0
            - action: homeassistant.update_entity
              data:
                entity_id:
                - sensor.solax_rest_local_settings
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{refresh_settings_delay}}'
                milliseconds: 0
            - if:
              - condition: template
                value_template: '{{repeat.index == 3}}'
              then:
              - event: Solax Zappi Octopus Control
                event_data:
                  message: Manual discharge failure @ {{now().strftime('%H:%M')}}.
                    Setting modes issue.
                  title: OP8:Manual Discharge Failure
                  class: high
                enabled: true
            until:
            - condition: template
              value_template: '{{ (state_attr(''sensor.solax_local_settings'', ''Data'')[10]
                == 3 and state_attr(''sensor.solax_local_settings'', ''Data'')[11]
                == 2) or repeat.index == 3 }}'
        - event: Solax Zappi Octopus Control
          event_data:
            message: Manual Discharge @ {{now().strftime('%H:%M')}}
            title: OP8:Manual Discharge Started
            class: normal
          enabled: true
    - conditions:
      - condition: trigger
        id:
        - StopForceDischarge
      - condition: template
        value_template: '{{(state_attr(''sensor.solax_local_settings'', ''Data'')[10]
          == 3)}}'
      sequence:
      - repeat:
          sequence:
          - data:
              value: '{{default_mode}}'
            action: rest_command.solax_local_set_inverter_mode
          - delay:
              hours: 0
              minutes: 0
              seconds: '{{mode_delay}}'
              milliseconds: 0
          - data:
              value: 0
            action: rest_command.solax_local_set_manual_mode_behaviour
          - delay:
              hours: 0
              minutes: 0
              seconds: '{{mode_delay}}'
              milliseconds: 0
          - action: homeassistant.update_entity
            data:
              entity_id:
              - sensor.solax_rest_local_settings
          - delay:
              hours: 0
              minutes: 0
              seconds: '{{refresh_settings_delay}}'
              milliseconds: 0
          until:
          - condition: template
            value_template: '{{ (state_attr(''sensor.solax_local_settings'', ''Data'')[10]
              == default_mode) or repeat.index == 3 }}'
      - event: Solax Zappi Octopus Control
        event_data:
          message: Manual Discharge Stopped @ {{now().strftime('%H:%M')}}
          title: OP9:Manual Discharge Stopped
          class: normal
        enabled: true
    - conditions:
      - condition: trigger
        id:
        - Discharge_battery_at_2330
      - condition: or
        conditions:
        - condition: state
          entity_id: sensor.zappi_plug_status
          state: EV Connected
        - condition: state
          entity_id: sensor.zappi_plug_status
          state: EV Disconnected
      sequence:
      - if:
        - condition: state
          entity_id: input_boolean.export_battery
          state: 'on'
        - condition: numeric_state
          entity_id: sensor.solax_local_battery_soc
          value_template: '{{ state.state | float(0)  - 4 }}'
          above: input_number.solax_manual_forced_discharge_limit_soc
        - condition: template
          value_template: '{{(state_attr(''sensor.solax_local_settings'', ''Data'')[10]
            != 3)}}'
        then:
        - repeat:
            sequence:
            - data:
                value: 3
              action: rest_command.solax_local_set_inverter_mode
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{mode_delay}}'
                milliseconds: 0
            - data:
                value: 2
              action: rest_command.solax_local_set_manual_mode_behaviour
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{mode_delay}}'
                milliseconds: 0
            - action: homeassistant.update_entity
              data:
                entity_id:
                - sensor.solax_rest_local_settings
            - delay:
                hours: 0
                minutes: 0
                seconds: '{{refresh_settings_delay}}'
                milliseconds: 0
            - if:
              - condition: template
                value_template: '{{repeat.index == 3}}'
              then:
              - event: Solax Zappi Octopus Control
                event_data:
                  message: Manual discharge failure @ {{now().strftime('%H:%M')}}.
                    Setting modes issue.
                  title: OP10:Manual Discharge Failure
                  class: high
                enabled: true
            until:
            - condition: template
              value_template: '{{ (state_attr(''sensor.solax_local_settings'', ''Data'')[10]
                == 3 and state_attr(''sensor.solax_local_settings'', ''Data'')[11]
                == 2) or repeat.index == 3 }}'
        - event: Solax Zappi Octopus Control
          event_data:
            message: 'Attempting Discharge @ {{now().strftime(''%H:%M'')}}. '
            title: OP10:Daily Battery Export
            class: normal
          enabled: true
        else:
        - event: Solax Zappi Octopus Control
          event_data:
            message: 'Cheap Rate @ {{now().strftime(''%H:%M'')}}. '
            title: OP10:Cheap Rate
            class: normal
          enabled: true
    - conditions:
      - condition: trigger
        id:
        - Peak Rate
      sequence:
      - repeat:
          sequence:
          - data:
              value: '{{default_mode}}'
            action: rest_command.solax_local_set_inverter_mode
          - delay:
              hours: 0
              minutes: 0
              seconds: '{{mode_delay}}'
              milliseconds: 0
          - action: homeassistant.update_entity
            data:
              entity_id:
              - sensor.solax_rest_local_settings
          - delay:
              hours: 0
              minutes: 0
              seconds: '{{refresh_settings_delay}}'
              milliseconds: 0
          until:
          - condition: template
            value_template: '{{ (state_attr(''sensor.solax_local_settings'', ''Data'')[10]
              == default_mode) or repeat.index == 3 }}'
      - event: Solax Zappi Octopus Control
        event_data:
          message: Peak Rate @ {{now().strftime('%H:%M')}}
          title: OP11:Peak Rate
          class: normal
        enabled: true
  - action: input_boolean.turn_off
