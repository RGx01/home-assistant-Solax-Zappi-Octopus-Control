        state: 'off'
      sequence:
      - data:
          level: '{{state(''input_number.octopus_free_session_battery_prep_soc'')}}'
        action: rest_command.solax_local_set_feedin_charge_battery_from_grid
      - delay:
          hours: 0
          minutes: 0
          seconds: 10
          milliseconds: 0
        enabled: true
      - data:
          level: '{{state(''input_number.octopus_free_session_battery_prep_soc'')}}'
        action: rest_command.solax_local_set_charge_battery_from_grid
      - delay:
          hours: 0
          minutes: 0
          seconds: 10
          milliseconds: 0
        enabled: true
      - data:
          level:
            '[object Object]':
        action: rest_command.solax_local_set_charge_battery_from_grid
